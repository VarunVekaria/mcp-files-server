# Replace `app` with a globally-unique name (this fixes your public URL,
# e.g. https://<app>.fly.dev, which the GitHub OAuth App's callback URL and
# the MCP_ISSUER_URL/MCP_RESOURCE_SERVER_URL secrets must match exactly).
app = "varun-mcp-files"
primary_region = "ewr"  # pick the region nearest you, e.g. iad, ewr, lhr

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "mcp_data"
  destination = "/app/data"
